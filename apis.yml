created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: orca-security:orca-security-rest-api
    name: Orca Security REST API
    description: >-
      Orca Security's REST API provides programmatic access to the Orca Cloud
      Security Platform for querying cloud inventory and assets, managing
      alerts and risk findings, configuring integrations and automations,
      running queries against the unified data model, and managing users,
      groups, and business units. The API is region-specific and uses
      API tokens generated from the Orca console with an
      "Authorization: Token <value>" header.
    humanURL: https://docs.orcasecurity.io/
    tags:
      - Alerts
      - Assets
      - Automations
      - Cloud Security
      - Integrations
      - REST API
    properties:
      - type: Documentation
        url: https://docs.orcasecurity.io/
      - type: APIReference
        url: https://app.orcasecurity.io/api-doc
      - type: Authentication
        url: https://docs.orcasecurity.io/docs/orca-api
      - type: TerraformProvider
        url: https://registry.terraform.io/providers/orcasecurity/orcasecurity/latest/docs
  - aid: orca-security:orca-security-scim-api
    name: Orca Security SCIM 2.0 API
    description: >-
      SCIM 2.0 endpoint for provisioning and de-provisioning users and groups
      in Orca Security from identity providers such as Okta, Azure AD, and
      OneLogin.
    humanURL: https://docs.orcasecurity.io/
    tags:
      - Identity
      - Provisioning
      - SCIM
      - User Management
    properties:
      - type: Documentation
        url: https://docs.orcasecurity.io/

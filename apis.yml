aid: orca-security
name: Orca Security
description: >-
  Orca Security is an agentless cloud security platform that uses its patented
  SideScanning technology to provide visibility into risks across AWS, Azure,
  Google Cloud, Oracle Cloud, Kubernetes, and serverless environments,
  covering CSPM, CWPP, CIEM, DSPM, vulnerability management, malware
  detection, API security, and AI security in a single platform. Orca exposes
  a region-aware REST API for assets, alerts, integrations, automations, and
  user management, plus SCIM 2.0 for identity provisioning and a Terraform
  provider for infrastructure-as-code workflows.
kind: company
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Agentless
  - API Security
  - CIEM
  - Cloud Security
  - CNAPP
  - CSPM
  - CWPP
  - DSPM
  - SideScanning
  - Vulnerability Management
